<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>19y</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="bg-shape bg-shape--yellow" aria-hidden="true"></div>
    <div class="bg-shape bg-shape--pink" aria-hidden="true"></div>
    <div class="bg-shape bg-shape--cyan" aria-hidden="true"></div>

    <div class="spotlight" aria-hidden="true"></div>

    <canvas id="pretext-hero" aria-hidden="true"></canvas>

    <div class="content-wrapper">
      <nav class="nav">
        <a href="#" class="logo"></a>
        <div class="nav-links">
          <a href="#about">About</a>
          <a href="#skills">Skills</a>
          <a href="#projects">Projects</a>
          <a href="#awards">Awards</a>
        </div>
      </nav>

      <header class="hero-spacer">
        <div class="hero-stamp">
          <span>EMBEDDED</span>
          <span class="hero-stamp__dot" aria-hidden="true"></span>
          <span>IOT</span>
          <span class="hero-stamp__dot" aria-hidden="true"></span>
          <span>ONLINE</span>
        </div>
      </header>

      <main class="resume-body">
        <section id="about" class="section fade-in">
          <div class="section-head">
            <span class="section-num">01</span>
            <h2 class="section-heading">About Me</h2>
          </div>
          <div class="about-card nb-card">
            <div class="about-card__top">
              <h3 class="name-title"></h3>
              <div class="badge-row" id="about-focus-tags"></div>
            </div>
            <p class="summary-text" id="about-opening-copy"></p>
          </div>
        </section>

        <section id="skills" class="section fade-in">
          <div class="section-head">
            <span class="section-num">02</span>
            <h2 class="section-heading">Expertise</h2>
          </div>
          <div class="skills-grid" id="skills-grid"></div>
        </section>

        <section id="projects" class="section fade-in">
          <div class="section-head">
            <span class="section-num">03</span>
            <h2 class="section-heading">Selected Works</h2>
          </div>
          <div class="projects-container nb-canvas-shell">
            <canvas id="pretext-projects"></canvas>
          </div>
        </section>

        <section id="awards" class="section fade-in">
          <div class="section-head">
            <span class="section-num">04</span>
            <h2 class="section-heading">Honors & Certs</h2>
          </div>
          <div class="awards-container nb-canvas-shell nb-canvas-shell--cyan">
            <canvas id="pretext-awards"></canvas>
          </div>
        </section>
      </main>

      <footer class="footer">
        <div class="footer-bar">
          <span class="footer-mark"></span>
          <span class="footer-sep" aria-hidden="true">/</span>
          <span class="footer-role"></span>
        </div>
        <p class="footer-note">Vite · @chenglou/pretext · Neo Brutalism</p>
      </footer>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
